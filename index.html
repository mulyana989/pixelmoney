<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelWorld - Multiplayer Sandbox Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
        <div id="ui-panel">
            <div id="top-panel">
                <div id="player-info">
                    <span id="player-name">Player: Unknown</span>
                    <span id="connection-status">🔴 Offline</span>
                </div>
            </div>
            
            <div id="sidebar">
                <div id="controls">
                    <h3>Controls</h3>
                    <div class="control-list">
                        <div>↑↓←→ or WASD - Move</div>
                        <div>Mouse Click - Place</div>
                        <div>Right Click - Remove</div>
                        <div>1-6 - Select Block</div>
                        <div>S - Save Game</div>
                        <div>L - Load Game</div>
                        <div>C - Clear World</div>
                    </div>
                </div>

                <div id="inventory">
                    <h3>Inventory</h3>
                    <div id="inventory-items"></div>
                </div>

                <div id="stats">
                    <h3>Stats</h3>
                    <div id="coords">Position: 0, 0</div>
                    <div id="fps">FPS: 60</div>
                    <div id="online-players">Online: 0</div>
                </div>

                <div id="server-panel">
                    <h3>Server</h3>
                    <div id="auth-section">
                        <input type="text" id="username-input" placeholder="Username" maxlength="20">
                        <input type="password" id="password-input" placeholder="Password">
                        <button id="login-btn">Login</button>
                        <button id="register-btn">Register</button>
                    </div>
                    <div id="world-section" style="display:none;">
                        <input type="text" id="world-name" placeholder="World name">
                        <button id="create-world-btn">Create World</button>
                        <select id="world-select"></select>
                        <button id="join-world-btn">Join World</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
